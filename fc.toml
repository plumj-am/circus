# FC CI Configuration File
# This file contains default configuration for all FC CI components

[database]
connect_timeout = 30
idle_timeout    = 600
max_connections = 20
max_lifetime    = 1800
min_connections = 5
url             = "postgresql://fc_ci:password@localhost/fc_ci"

[server]
allowed_origins = [  ]
host            = "127.0.0.1"
max_body_size   = 10485760    # 10MB
port            = 3000
request_timeout = 30

[evaluator]
allow_ifd     = false
git_timeout   = 600
nix_timeout   = 1800
poll_interval = 60
restrict_eval = true
work_dir      = "/tmp/fc-evaluator"

[queue_runner]
build_timeout = 3600
poll_interval = 5
work_dir      = "/tmp/fc-queue-runner"
workers       = 4
