<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}circus{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><a href="/">circus</a></div>
    <div class="nav-links">
      <a href="/projects">Projects</a>
      <a href="/evaluations">Evaluations</a>
      <a href="/builds">Builds</a>
      <a href="/queue">Queue</a>
      <a href="/channels">Channels</a>
      <a href="/news">News</a>
      <a href="/starred">Starred</a>
      <a href="/metrics">Metrics</a>
      <a href="/users">Users</a>
      <a href="/admin">Admin</a>
    </div>
    <div class="nav-auth">
      {% block auth %}{% endblock %}
    </div>
  </nav>
  <main class="page-main">
    <div class="container">
      {% block breadcrumbs %}{% endblock %}
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer class="footer">
    <p>circus &mdash; Nix-based continuous integration</p>
  </footer>
  <script>
  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function showError(el, msg) {
    el.innerHTML = '<div class="flash-message flash-error">' + escapeHtml(msg) + '</div>';
  }
  </script>
  <script>
  // Tick any element carrying data-live-elapsed="<unix-epoch-seconds>" once
  // per second so running build timers advance without a page refresh.
  (function() {
    function fmt(secs) {
      if (secs < 0) secs = 0;
      var m = Math.floor(secs / 60);
      var s = secs % 60;
      return m > 0 ? m + 'm ' + s + 's' : s + 's';
    }
    function tick() {
      var now = Math.floor(Date.now() / 1000);
      var nodes = document.querySelectorAll('[data-live-elapsed]');
      for (var i = 0; i < nodes.length; i++) {
        var start = parseInt(nodes[i].getAttribute('data-live-elapsed'), 10);
        if (!isNaN(start)) nodes[i].textContent = fmt(now - start);
      }
    }
    tick();
    setInterval(tick, 1000);
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
